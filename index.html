<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Timeline & Finance Log | Block UI</title>
    <link class="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0e12">
    <link class="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5499/5499335.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 0%, #1a1235 0%, #0d0e12 100%);
            --panel-bg: rgba(22, 25, 35, 0.65);
            --border-glow: rgba(168, 85, 247, 0.4);
            
            --cyan: #00f2fe;
            --purple: #a855f7;
            --pink: #f43f5e;
            --emerald: #10b981;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        0 0 40px rgba(168, 85, 247, 0.1);
            position: relative;
        }

        .web3-header {
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            margin: 0 0 6px 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .theme-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .theme-controls-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-theme-toggle {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--cyan);
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .theme-dropdown-select {
            background: #0d0e12;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            outline: none;
        }

        .network-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            background: rgba(168, 85, 247, 0.15);
            color: var(--purple);
            padding: 4px 10px;
            border-radius: 100px;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .network-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyan);
        }

        .web3-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            background: transparent;
            color: var(--text-muted);
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.15) 0%, rgba(168, 85, 247, 0.15) 100%);
            color: var(--cyan);
            border: 1px solid rgba(0, 242, 254, 0.25);
        }

        /* ===== CHUẨN KỸ THUẬT ẨN TAB KHÔNG DÙNG DISPLAY: NONE ===== */
        .tab-content {
            height: 0;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .tab-content.active {
            height: auto;
            overflow: visible;
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 28px;
        }

        button {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 15px;
            padding: 14px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-record {
            background: linear-gradient(135deg, #4f46e5 0%, var(--purple) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .btn-record.recording {
            background: linear-gradient(135deg, var(--pink) 0%, #dc2626 100%);
            animation: pulse-glow 1.5s infinite;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.98); opacity: 0.85; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            min-height: 20px;
        }

        .preview-wrapper {
            position: relative;
            width: 100%;
        }

        #preview-text {
            width: 100%;
            min-height: 80px;
            box-sizing: border-box;
            padding: 14px;
            padding-right: 36px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: var(--text-main);
            resize: vertical;
            font-size: 14px;
            line-height: 1.6;
            font-family: inherit;
        }

        #preview-text:focus {
            outline: none;
            border-color: var(--purple);
        }

        .btn-clear-input {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 24px;
            height: 24px;
            padding: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-save {
            background: linear-gradient(135deg, #059669 0%, var(--emerald) 100%);
            color: white;
        }

        /* ===== STYLES BỐ CỤC KHỐI LOGS ===== */
        .logs-section {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 20px;
        }

        .logs-header-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .logs-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--text-main);
        }

        .btn-sort-toggle {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
        }

        .btn-sort-toggle:hover {
            border-color: var(--cyan);
            color: var(--text-main);
        }

        .log-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 12px;
            position: relative;
            transition: all 0.3s ease;
        }

        /* HÀNG 1 MAIN */
        .log-row-1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .log-block-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            color: var(--cyan);
            background: rgba(0, 242, 254, 0.1);
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        .log-actions-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* HÀNG 2 MAIN */
        .log-row-2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .log-task-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            word-break: break-word;
        }

        .log-total-money {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .log-total-money.plus { background: rgba(16, 185, 129, 0.2); color: #4ade80; }
        .log-total-money.minus { background: rgba(244, 63, 94, 0.2); color: #f43f5e; }
        .log-total-money.zero { background: rgba(255, 255, 255, 0.08); color: var(--text-muted); }

        .btn-action-icon {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            border-radius: 8px;
            width: 30px;
            height: 30px;
            padding: 0;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-action-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .btn-action-icon.btn-dropdown.active {
            background: rgba(168, 85, 247, 0.25);
            color: var(--purple);
            border-color: var(--purple);
            transform: rotate(180deg);
        }

        .btn-action-icon.btn-delete:hover {
            background: rgba(244, 63, 94, 0.2);
            color: var(--pink);
            border-color: var(--pink);
        }

        /* ===== NỘI DUNG DROPDOWN ===== */
        .log-dropdown-content {
            display: none;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .timestamp-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .timestamp-item:last-child {
            margin-bottom: 0;
        }

        .dd-left-col {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .dd-row-1-num {
            font-size: 11px;
            font-weight: 700;
            color: var(--cyan);
        }

        .dd-row-2-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .tx-badge {
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: bold;
            white-space: nowrap;
        }
        .tx-plus { background: rgba(16, 185, 129, 0.2); color: #4ade80; }
        .tx-minus { background: rgba(244, 63, 94, 0.2); color: #f43f5e; }

        /* TAB TÀI CHÍNH STYLES & CHART CONTAINER CHUẨN */
        .finance-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .balance-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .balance-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: var(--cyan);
        }

        .init-balance-box {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .input-balance {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 8px 12px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn-init {
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 10px;
            background: var(--purple);
            color: #fff;
        }

        .chart-wrapper {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px;
        }

        /* Bắt buộc height & position relative cho Chart.js */
        .chart-container-box {
            position: relative;
            width: 100%;
            height: 220px;
        }

        .btn-clear-all {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            font-size: 13px;
            background: rgba(244, 63, 94, 0.15);
            border: 1px solid rgba(244, 63, 94, 0.4);
            color: var(--pink);
            border-radius: 12px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="web3-header">
        <h2>AI HUB LOG ENGINE</h2>
        <div class="network-badge">Local Engine / Financial Track</div>
    </div>

    <div class="theme-section">
        <div class="theme-label">Giao diện</div>
        <div class="theme-controls-wrapper">
            <button id="theme-toggle-btn" class="btn-theme-toggle">⚡ Đổi nhanh</button>
            <select id="theme-select" class="theme-dropdown-select">
                <option value="cyber">Cyber Purple</option>
                <option value="gold">Hoàng Kim</option>
                <option value="blood">Huyết Nguyệt</option>
                <option value="emerald">Phỉ Thúy</option>
            </select>
        </div>
    </div>

    <div class="web3-tabs">
        <button class="tab-btn active" data-tab="timeline">📝 Lịch Trình</button>
        <button class="tab-btn" data-tab="finance">📊 Xu hướng</button>
    </div>

    <!-- TAB 1: Lịch Trình -->
    <div id="tab-timeline" class="tab-content active">
        <div class="controls">
            <button id="record-btn" class="btn-record">
                 <span id="btn-text">🎙️ Nhấn để ghi âm</span>
            </button>
            <div id="status" class="status">Mẹo: Đọc rõ các số. Riêng số tròn trăm,... đọc rõ</div>
            
            <div class="preview-wrapper">
                <textarea id="preview-text" placeholder="Dữ liệu + Từ khóa (Vd: Work a100, Eat b50)"></textarea>
                <button id="clear-input-btn" class="btn-clear-input" title="Xóa nội dung">✕</button>
            </div>

            <button id="save-btn" class="btn-save">💾 Mint dữ liệu</button>
        </div>

        <div class="logs-section">
            <div class="logs-header-toolbar">
                <span class="logs-title">Danh sách Khối dữ liệu Ledger</span>
                <!-- Nút Sort Toggle tinh chỉnh nhỏ gọn -->
                <button id="sort-toggle-btn" class="btn-sort-toggle" title="Sắp xếp danh sách">
    <span id="sort-icon">⬆️</span>
    <span id="sort-label">Mới nhất</span>
</button>
            </div>

            <div id="logs-container"></div>

            <button id="clear-all-btn" class="btn-clear-all" style="display: none;">
                🗑️ Wipe Toàn Bộ Data (Lịch Trình & Tài Chính)
            </button>
        </div>
    </div>

    <!-- TAB 2: Tài Chính -->
    <div id="tab-finance" class="tab-content">
        <div class="finance-card">
            <div class="balance-title">Số dư hiện tại ($)</div>
            <div id="balance-display" class="balance-value">0</div>
        </div>

        <!-- Khung biểu đồ -->
        <div class="chart-wrapper">
            <div class="balance-title" style="margin-bottom: 8px;">Biểu đồ Biến động Tài sản</div>
            <div id="chart-box" class="chart-container-box">
                <canvas id="financeChart"></canvas>
            </div>
        </div>

        <!-- Đã dời phần nạp/khởi tạo số dư xuống CUỐI TAB XU HƯỚNG -->
        <div class="finance-card" style="margin-top: 20px; margin-bottom: 0;">
            <div class="balance-title">Cấu hình số dư ban đầu</div>
            <div class="init-balance-box">
                <input type="number" id="init-balance-input" class="input-balance" placeholder="Nhập số tiền ban đầu...">
                <button id="init-balance-btn" class="btn-init">Khởi tạo</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./app.js"></script>

</body>
</html>
